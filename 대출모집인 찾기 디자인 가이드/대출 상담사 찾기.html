<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대출 상담사 찾기 — 매물 카드 시안</title>

  <link rel="stylesheet" href="design-system/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F5F5F7; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { color: #1F2937; -webkit-font-smoothing: antialiased; }
    .preamble {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 24px 16px;
    }
    .preamble h1 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.4px;
      margin: 0 0 4px;
    }
    .preamble .sub {
      font-size: 13px; color: #6B7280; font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="preamble">
    <h1>컴포넌트 시안</h1>
    <div class="sub">매물 카드 · 상담사 카드 — 정보 위계 탐색</div>
  </div>

  <div id="canvas-root"></div>

  <script type="text/babel" src="screens/data.jsx"></script>
  <script type="text/babel" src="screens/property-card.jsx"></script>
  <script type="text/babel" src="screens/consultant-card.jsx"></script>
  <script type="text/babel" src="screens/list-screen.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function App() {
      const c = CONSULTANTS[0]; // 김서윤

      const Slot = ({ children, padding = 20 }) => (
        <div style={{
          width: 360, padding,
          background: '#F4F4F6',
          fontFamily: "'Pretendard', -apple-system, sans-serif",
          boxSizing: 'border-box',
          height: '100%',
        }}>{children}</div>
      );

      return (
        <DesignCanvas>
          <DCSection id="large" title="매물 카드 — 큰" subtitle="리스트 화면 상단 hero용">
            <DCArtboard id="large-h" label="A · 가로 (썸네일 좌)" width={360} height={140}>
              <Slot><PropertyCardLargeH /></Slot>
            </DCArtboard>
            <DCArtboard id="large-v" label="B · 세로 (풀폭 이미지 위)" width={360} height={300}>
              <Slot><PropertyCardLargeV /></Slot>
            </DCArtboard>
          </DCSection>

          <DCSection id="small" title="매물 카드 — 작은" subtitle="상세 화면 상단 sticky용">
            <DCArtboard id="small-default" label="컴팩트 한 줄" width={360} height={90}>
              <Slot><PropertyCardSmall /></Slot>
            </DCArtboard>
          </DCSection>

          <DCSection id="consultant" title="상담사 카드" subtitle="정보 위계 탐색 · 김서윤 예시">
            <DCArtboard id="cc-a" label="A · 미니멀 (5요소)" width={360} height={110}>
              <Slot><ConsultantCardA consultant={c} /></Slot>
            </DCArtboard>
            <DCArtboard id="cc-b" label="B · + 응답 속도" width={360} height={110}>
              <Slot><ConsultantCardB consultant={c} /></Slot>
            </DCArtboard>
            <DCArtboard id="cc-c" label="C · + 전문 분야 칩" width={360} height={110}>
              <Slot><ConsultantCardC consultant={c} /></Slot>
            </DCArtboard>
            <DCArtboard id="cc-d" label="D · 강점 뱃지" width={360} height={110}>
              <Slot><ConsultantCardD consultant={c} /></Slot>
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="조합 — 전체 화면" subtitle="매물 카드 + 상담사 리스트 합쳐서 보기">
            <DCArtboard id="screen-row" label="E · 카페인 스타일 (행 리스트)" width={390} height={1100}>
              <ListScreenRow />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('canvas-root')).render(<App />);
  </script>

</body>
</html>
