<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>보고용 — 대출모집인 찾기 유입 시나리오</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00DE5A;
  --primary-700: #00A847;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-500: #6B7280;
  --gray-700: #374151;
  --gray-900: #1F2937;
}
html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #EAEAEC; color: var(--gray-900); -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* 좌측 상단 고정 패널 */
.panel {
  position: fixed; top: 24px; left: 24px;
  width: 220px; z-index: 100;
  display: flex; flex-direction: column; gap: 8px;
}
.panel__title {
  font-size: 14px; font-weight: 800; color: var(--gray-900);
  letter-spacing: -0.3px; line-height: 1.4; margin-bottom: 6px;
}
.entries { display: flex; flex-direction: column; gap: 6px; }
.entry {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; background: #fff; border: 1px solid var(--gray-200);
  border-radius: 9px; cursor: pointer; text-align: left;
  transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit; width: 100%;
}
.entry:hover {
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(0, 222, 90, 0.1);
}
.entry.is-active {
  border-color: var(--primary); background: #F0FDF4;
  box-shadow: 0 0 0 2px rgba(0, 222, 90, 0.18);
}
.entry__num {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  background: var(--gray-100); color: var(--gray-700);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.entry.is-active .entry__num,
.entry:hover .entry__num { background: var(--primary); color: #fff; }
.entry__title {
  font-size: 12px; font-weight: 700; color: var(--gray-900);
  letter-spacing: -0.2px; line-height: 1.35;
}

.home-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  padding: 7px 10px; background: #fff; border: 1px solid var(--gray-200);
  border-radius: 7px; cursor: pointer; font-family: inherit;
  font-size: 11.5px; font-weight: 700; color: var(--gray-700);
  transition: all 150ms; margin-top: 4px;
}
.home-btn:hover { border-color: var(--gray-900); color: var(--gray-900); }
.home-btn::before { content: '←'; }
.open-new {
  font-size: 11px; color: var(--gray-500);
  text-decoration: none; font-weight: 600; text-align: center;
}
.open-new:hover { color: var(--gray-900); }

/* 중앙 정렬 스테이지 — iframe은 콘텐츠 높이만큼 펼쳐지고 외부 윈도우가 스크롤한다 */
.stage {
  position: relative;
  width: 390px;
  margin: 0 auto;
  padding: 24px 0;
}
.frame {
  width: 390px;
  background: #fff;
  position: relative;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}
.frame iframe {
  width: 100%; border: 0; display: block;
  height: 100vh; /* 초기값, 로드 후 콘텐츠 높이로 교체 */
}

/* 오버레이 */
.overlay {
  position: absolute; inset: 0;
  pointer-events: none;
}
.spot {
  position: absolute;
  border: 3px solid var(--primary);
  border-radius: 14px;
  box-shadow: 0 0 0 4px rgba(0, 222, 90, 0.25), 0 8px 24px rgba(0,0,0,0.15);
  background: rgba(0, 222, 90, 0.06);
  animation: spot-pulse 1.4s ease-in-out 1 forwards;
  transition: all 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes spot-pulse {
  0%, 100% {
    box-shadow: 0 0 0 4px rgba(0, 222, 90, 0.25), 0 0 0 0 rgba(0, 222, 90, 0.4);
  }
  50% {
    box-shadow: 0 0 0 6px rgba(0, 222, 90, 0.15), 0 0 0 16px rgba(0, 222, 90, 0);
  }
}
.spot.is-fading, .pin.is-fading {
  opacity: 0 !important;
  transition: opacity 400ms ease-out;
}
.pin {
  position: absolute;
  background: var(--primary-700); color: #fff;
  font-weight: 800; font-size: 11px;
  padding: 5px 9px; border-radius: 999px;
  white-space: nowrap;
  transform: translate(-50%, calc(-100% - 8px));
  box-shadow: 0 4px 12px rgba(0, 168, 71, 0.4);
  animation: pin-bounce 1.2s ease-in-out 1;
}
.pin::after {
  content: ''; position: absolute; left: 50%; bottom: -5px;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 5px solid var(--primary-700);
}
@keyframes pin-bounce {
  0%, 100% { transform: translate(-50%, calc(-100% - 8px)); }
  50%      { transform: translate(-50%, calc(-100% - 14px)); }
}
</style>
</head>
<body>
<!-- 좌측 상단 고정 패널 -->
<div class="panel">
  <div class="panel__title">대출모집인 찾기<br>유입 시나리오</div>

  <div class="entries">
    <button class="entry" data-href="property-detail.html?id=jaie" data-targets="#ctaConsultants">
      <span class="entry__num">1</span>
      <span class="entry__title">부동산 매물 상세</span>
    </button>
    <button class="entry" data-href="compare-main.html" data-targets=".consult-strip">
      <span class="entry__num">2</span>
      <span class="entry__title">주담대 비교 메인</span>
    </button>
    <button class="entry" data-href="compare-result.html" data-targets=".consult-after-prop,.split-banner .is-consult,.consult-callout">
      <span class="entry__num">3</span>
      <span class="entry__title">주담대 비교 결과</span>
    </button>
    <button class="entry" data-href="index-pc.html" data-targets=".ccard" data-width="1280">
      <span class="entry__num">4</span>
      <span class="entry__title">대출모집인 메인 (PC)</span>
    </button>
  </div>

  <button class="home-btn" id="homeBtn">메인으로</button>
  <a class="open-new" id="openNewLink" href="index.html" target="_blank">새 탭에서 열기 ↗</a>
</div>

<!-- 중앙 스테이지 -->
<div class="stage">
  <div class="frame">
    <iframe id="previewFrame" src="index.html" title="대출모집인 찾기" scrolling="no"></iframe>
    <div class="overlay" id="overlay"></div>
  </div>
</div>

<script>
(function () {
  const frame = document.getElementById('previewFrame');
  const overlay = document.getElementById('overlay');
  const homeBtn = document.getElementById('homeBtn');
  const openNew = document.getElementById('openNewLink');
  const entries = document.querySelectorAll('.entry');

  let pendingTargets = null;
  let timers = [];
  let scrollHandler = null;
  let sheetSyncHandler = null;
  let sheetObserver = null;

  function clearOverlay() {
    overlay.innerHTML = '';
    timers.forEach(t => clearTimeout(t));
    timers = [];
    if (scrollHandler) {
      window.removeEventListener('scroll', scrollHandler);
      window.removeEventListener('resize', scrollHandler);
    }
    scrollHandler = null;
  }

  // iframe을 콘텐츠 높이로 맞추기 (내부 스크롤 제거)
  // 내부 페이지의 min-height:100vh 를 무력화해서 콘텐츠 실제 높이를 측정
  function injectHeightFix(doc) {
    if (!doc || doc.__heightFixed) return;
    doc.__heightFixed = true;
    const style = doc.createElement('style');
    style.textContent = `
      html, body { min-height: 0 !important; height: auto !important; }
      .page, .app, .container, [class*="wrap"], [class*="page"] {
        min-height: 0 !important;
      }
    `;
    doc.head.appendChild(style);
  }

  function resizeIframeToContent() {
    try {
      const doc = frame.contentDocument;
      if (!doc) return;
      // 시트가 열린 동안에는 syncSheetPositions 가 iframe 높이를 관리한다
      if (doc.querySelector('.sheet.open')) return;
      injectHeightFix(doc);
      // 측정 전 iframe 높이를 0으로 줄여서 100vh 영향 제거 후 실제 콘텐츠 높이 측정
      frame.style.height = '0px';
      // 강제 리플로우
      void doc.documentElement.offsetHeight;
      const h = Math.max(
        doc.documentElement.scrollHeight,
        doc.body ? doc.body.scrollHeight : 0
      );
      frame.style.height = h + 'px';
    } catch (e) {}
  }

  // iframe 안 .sheet / .sheet-backdrop 을 외부 스크롤 좌표 기준으로 재배치
  // (position:fixed 가 iframe 내 뷰포트에 고정되는 문제 해결)
  // 시트는 내부 스크롤 없이 전체 콘텐츠 높이로 그리고, iframe 자체를 늘려서
  // 외부 페이지 스크롤만으로 시트 끝까지 볼 수 있게 함.
  let sheetAnchorTop = null; // 시트 연 시점의 문서 좌표 (스크롤해도 고정)
  let baseIframeHeight = 0;  // 시트 열기 전 iframe 본래 높이
  let sheetWasOpen = false;

  function syncSheetPositions() {
    const doc = frame.contentDocument;
    if (!doc) return;
    const frameRect = frame.getBoundingClientRect();
    const visibleTop = Math.max(0, -frameRect.top);
    const viewH = window.innerHeight;
    const sheets = doc.querySelectorAll('.sheet');
    let anyOpen = false;
    sheets.forEach(s => { if (s.classList.contains('open')) anyOpen = true; });

    sheets.forEach(s => {
      s.style.position = 'absolute';
      s.style.left = '50%';
      s.style.bottom = 'auto';
      s.style.maxHeight = 'none';
      s.style.overflowY = 'visible';
      s.style.height = 'auto';
      s.style.transform = 'translateX(-50%)';
      const isOpen = s.classList.contains('open');
      if (isOpen) {
        if (!sheetWasOpen) {
          sheetAnchorTop = visibleTop + 24;
          const curIframeH = parseInt(frame.style.height, 10) || 0;
          baseIframeHeight = curIframeH;
        }
        s.style.top = sheetAnchorTop + 'px';
        const sheetH = s.offsetHeight || 0;
        const needed = sheetAnchorTop + sheetH + 24;
        // iframe 높이를 정확히 시트 끝 + 24 로 — 시트 아래 콘텐츠 노출 방지
        frame.style.height = needed + 'px';
      } else {
        s.style.top = (visibleTop + viewH + 100) + 'px';
      }
    });

    // backdrop: iframe 전체를 덮음 (시트 위/아래 영역 모두 가림)
    doc.querySelectorAll('.sheet-backdrop').forEach(b => {
      b.style.position = 'absolute';
      b.style.top = '0';
      b.style.left = '0';
      b.style.right = '0';
      b.style.width = '100%';
      const ifH = parseInt(frame.style.height, 10) || viewH;
      b.style.height = ifH + 'px';
    });

    if (!anyOpen && sheetWasOpen && baseIframeHeight) {
      frame.style.height = baseIframeHeight + 'px';
      baseIframeHeight = 0;
      sheetAnchorTop = null;
    }
    sheetWasOpen = anyOpen;
  }

  function attachSheetSync() {
    detachSheetSync();
    const doc = frame.contentDocument;
    if (!doc) return;
    sheetSyncHandler = () => syncSheetPositions();
    window.addEventListener('scroll', sheetSyncHandler, { passive: true });
    window.addEventListener('resize', sheetSyncHandler);
    // .sheet 의 class 변경(open 토글) 감지
    sheetObserver = new MutationObserver(() => syncSheetPositions());
    doc.querySelectorAll('.sheet, .sheet-backdrop').forEach(el => {
      sheetObserver.observe(el, { attributes: true, attributeFilter: ['class', 'style'] });
    });
    syncSheetPositions();
  }

  function detachSheetSync() {
    if (sheetSyncHandler) {
      window.removeEventListener('scroll', sheetSyncHandler);
      window.removeEventListener('resize', sheetSyncHandler);
      sheetSyncHandler = null;
    }
    if (sheetObserver) {
      sheetObserver.disconnect();
      sheetObserver = null;
    }
  }

  function placeMarker(spot, pin, el) {
    const rect = el.getBoundingClientRect();
    const overlayRect = overlay.getBoundingClientRect();
    // 오버레이 경계 안으로 클램프 (좌우로 샐이져 나가지 않도록)
    const left = Math.max(2, rect.left - 4);
    const right = Math.min(overlayRect.width - 2, rect.right + 4);
    const top = rect.top - 4;
    const height = rect.height + 8;
    spot.style.left = left + 'px';
    spot.style.top = top + 'px';
    spot.style.width = (right - left) + 'px';
    spot.style.height = height + 'px';
    if (pin) {
      const cx = Math.max(30, Math.min(overlayRect.width - 30, rect.left + rect.width / 2));
      pin.style.left = cx + 'px';
      pin.style.top = top + 'px';
    }
  }

  function highlightTargets(targetsCsv) {
    clearOverlay();
    const doc = frame.contentDocument;
    if (!doc || !targetsCsv) return;
    const selectors = targetsCsv.split(',').map(s => s.trim()).filter(Boolean);
    const elements = [];
    selectors.forEach(sel => {
      const el = doc.querySelector(sel);
      if (el) elements.push(el);
    });
    if (!elements.length) return;

    // 외부 윈도우 스크롤로 첫 타깃을 화면 중앙으로
    try {
      const r = elements[0].getBoundingClientRect();
      const fr = frame.getBoundingClientRect();
      const targetY = window.scrollY + fr.top + r.top - window.innerHeight / 2 + r.height / 2;
      window.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
    } catch (e) {}

    const markers = [];
    elements.forEach((el, i) => {
      const spotEl = document.createElement('div');
      spotEl.className = 'spot';
      const pinEl = document.createElement('div');
      pinEl.className = 'pin';
      pinEl.textContent = '진입';
      spotEl.style.opacity = '0';
      pinEl.style.opacity = '0';
      overlay.appendChild(spotEl);
      overlay.appendChild(pinEl);
      markers.push({ el, spot: spotEl, pin: pinEl });

      timers.push(setTimeout(() => {
        spotEl.style.opacity = '1';
        pinEl.style.opacity = '1';
        placeMarker(spotEl, pinEl, el);
      }, 350 + i * 250));

      // 펄스 1회 후 페이드 아웃 (1.4s + 등장 지연)
      const fadeStart = 350 + i * 250 + 1500;
      timers.push(setTimeout(() => {
        spotEl.classList.add('is-fading');
        pinEl.classList.add('is-fading');
      }, fadeStart));
      timers.push(setTimeout(() => {
        spotEl.remove();
        pinEl.remove();
      }, fadeStart + 450));
    });

    scrollHandler = () => {
      markers.forEach(m => {
        if (m.spot.style.opacity === '1') placeMarker(m.spot, m.pin, m.el);
      });
    };
    window.addEventListener('scroll', scrollHandler, { passive: true });
    window.addEventListener('resize', scrollHandler);
  }

  function setActive(href) {
    entries.forEach(e => {
      e.classList.toggle('is-active', e.dataset.href === href);
    });
  }

  entries.forEach(btn => {
    btn.addEventListener('click', () => {
      const href = btn.dataset.href;
      pendingTargets = btn.dataset.targets || null;
      // 시나리오별 스테이지 너비 (PC 등)
      const w = parseInt(btn.dataset.width, 10) || 390;
      applyStageWidth(w);
      let sameUrl = false;
      try {
        sameUrl = frame.contentWindow && frame.contentWindow.location.href.endsWith(href);
      } catch (e) {}
      if (sameUrl) {
        highlightTargets(pendingTargets);
        pendingTargets = null;
      } else {
        clearOverlay();
        frame.src = href;
      }
      openNew.href = href;
      setActive(href);
    });
  });

  homeBtn.addEventListener('click', () => {
    pendingTargets = null;
    clearOverlay();
    applyStageWidth(390);
    frame.src = 'index.html';
    openNew.href = 'index.html';
    setActive(null);
  });

  // 스테이지/프레임 너비를 시나리오에 맞게 변경 (모바일 390, PC 1280 등)
  // 좌측 고정 패널(0~260px) 영역을 피해서 배치
  function applyStageWidth(w) {
    const stage = document.querySelector('.stage');
    const fr    = document.querySelector('.frame');
    if (!stage || !fr) return;
    const PANEL_RESERVE = 260; // 좌측 패널 영역
    const available = Math.max(390, window.innerWidth - PANEL_RESERVE - 24);
    const actual = Math.min(w, available);
    stage.style.width = actual + 'px';
    fr.style.width = actual + 'px';
    if (w > 390) {
      // PC 모드: 좌측 패널을 피해 우측 영역에 배치
      stage.style.marginLeft = PANEL_RESERVE + 'px';
      stage.style.marginRight = 'auto';
    } else {
      // 모바일 모드: 중앙 정렬
      stage.style.marginLeft = 'auto';
      stage.style.marginRight = 'auto';
    }
  }

  frame.addEventListener('load', () => {
    // iframe 내부에서 페이지가 바뀌면 항상 기존 강조는 제거
    if (!pendingTargets) clearOverlay();
    detachSheetSync();

    // 콘텐츠 높이 맞춤 (레이아웃 안정화 후 다시 한번 더)
    resizeIframeToContent();
    setTimeout(resizeIframeToContent, 200);
    setTimeout(resizeIframeToContent, 600);

    // iframe 내부 동적 콘텐츠 변경 감지 (경담사 더보기, 시트 등)
    try {
      const doc = frame.contentDocument;
      if (doc && doc.body && !doc.body.__resizeObserved) {
        doc.body.__resizeObserved = true;
        const ro = new ResizeObserver(() => resizeIframeToContent());
        ro.observe(doc.body);
      }
    } catch (e) {}

    // 시트 외부 스크롤 동기화
    attachSheetSync();

    if (pendingTargets) {
      clearOverlay();
      setTimeout(() => {
        resizeIframeToContent();
        highlightTargets(pendingTargets);
        pendingTargets = null;
      }, 400);
    }
    try {
      const path = frame.contentWindow.location.pathname.split('/').pop();
      const search = frame.contentWindow.location.search || '';
      const full = path + search;
      const match = Array.from(entries).find(e => e.dataset.href === full || e.dataset.href.startsWith(path));
      if (match) { setActive(match.dataset.href); openNew.href = match.dataset.href; }
      else if (path === 'index.html' || path === '') { setActive(null); openNew.href = 'index.html'; }
    } catch (e) {}
  });
})();
</script>
</body>
</html>
