<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>보고용 — 대출모집인 찾기 유입 시나리오</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00DE5A;
  --primary-700: #00A847;
  --gray-50: #FAFAFA;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-500: #6B7280;
  --gray-700: #374151;
  --gray-900: #1F2937;
}
html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #EAEAEC; color: var(--gray-900); -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* 좌측 슬림 사이드바 + 우측 프로토타입 */
.report {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
  align-items: start;
  min-height: 100vh;
}

.panel {
  position: sticky; top: 24px;
  display: flex; flex-direction: column; gap: 10px;
}
.panel__title {
  font-size: 15px; font-weight: 800; color: var(--gray-900);
  letter-spacing: -0.3px; line-height: 1.4; margin-bottom: 4px;
}
.panel__sub {
  font-size: 12px; color: var(--gray-500); font-weight: 500;
  line-height: 1.5; margin-bottom: 8px;
}

.entries { display: flex; flex-direction: column; gap: 8px; }
.entry {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: #fff; border: 1px solid var(--gray-200);
  border-radius: 10px; cursor: pointer; text-align: left;
  transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit; width: 100%;
}
.entry:hover {
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(0, 222, 90, 0.1);
}
.entry.is-active {
  border-color: var(--primary); background: #F0FDF4;
  box-shadow: 0 0 0 2px rgba(0, 222, 90, 0.18);
}
.entry__num {
  width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
  background: var(--gray-100); color: var(--gray-700);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
}
.entry.is-active .entry__num,
.entry:hover .entry__num { background: var(--primary); color: #fff; }
.entry__title {
  font-size: 12.5px; font-weight: 700; color: var(--gray-900);
  letter-spacing: -0.2px; line-height: 1.35;
}

.home-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  padding: 8px 12px; background: #fff; border: 1px solid var(--gray-200);
  border-radius: 8px; cursor: pointer; font-family: inherit;
  font-size: 12px; font-weight: 700; color: var(--gray-700);
  transition: all 150ms; margin-top: 8px;
}
.home-btn:hover { border-color: var(--gray-900); color: var(--gray-900); }
.home-btn::before { content: '←'; }

.open-new {
  font-size: 11px; color: var(--gray-500);
  text-decoration: none; font-weight: 600;
  padding: 4px 0; text-align: center;
}
.open-new:hover { color: var(--gray-900); }

/* 우측: 모바일 프레임 + 오버레이 컨테이너 */
.stage {
  position: relative;
  width: 390px; margin: 0 auto;
}
.frame {
  width: 390px; height: calc(100vh - 48px); min-height: 760px; max-height: 920px;
  background: #fff; border-radius: 28px; overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.04);
  position: relative;
}
.frame iframe {
  width: 100%; height: 100%; border: 0; display: block;
}

/* 오버레이 — iframe 위에 절대 위치 링/핀 표시 */
.overlay {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
  border-radius: 28px;
}
.spot {
  position: absolute;
  border: 3px solid var(--primary);
  border-radius: 14px;
  box-shadow: 0 0 0 4px rgba(0, 222, 90, 0.25), 0 8px 24px rgba(0,0,0,0.15);
  background: rgba(0, 222, 90, 0.06);
  animation: spot-pulse 1.4s ease-in-out infinite;
  transition: all 220ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes spot-pulse {
  0%, 100% {
    box-shadow: 0 0 0 4px rgba(0, 222, 90, 0.25), 0 0 0 0 rgba(0, 222, 90, 0.4);
  }
  50% {
    box-shadow: 0 0 0 6px rgba(0, 222, 90, 0.15), 0 0 0 16px rgba(0, 222, 90, 0);
  }
}
.pin {
  position: absolute;
  background: var(--primary-700); color: #fff;
  font-weight: 800; font-size: 11px;
  padding: 5px 9px; border-radius: 999px;
  white-space: nowrap;
  transform: translate(-50%, calc(-100% - 8px));
  box-shadow: 0 4px 12px rgba(0, 168, 71, 0.4);
  animation: pin-bounce 1.2s ease-in-out infinite;
}
.pin::after {
  content: ''; position: absolute; left: 50%; bottom: -5px;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 5px solid var(--primary-700);
}
@keyframes pin-bounce {
  0%, 100% { transform: translate(-50%, calc(-100% - 8px)); }
  50%      { transform: translate(-50%, calc(-100% - 14px)); }
}

@media (max-width: 760px) {
  .report { grid-template-columns: 1fr; }
  .panel { position: relative; top: 0; }
}
</style>
</head>
<body>
<div class="report">
  <!-- 좌: 슬림 패널 -->
  <div class="panel">
    <div class="panel__title">대출모집인 찾기<br>유입 시나리오</div>
    <div class="panel__sub">카드 클릭 → 해당 화면 진입점 강조</div>

    <div class="entries">
      <button class="entry" data-href="property-detail.html?id=jaie" data-targets="#ctaConsultants">
        <span class="entry__num">1</span>
        <span class="entry__title">부동산 매물 상세</span>
      </button>
      <button class="entry" data-href="compare-main.html" data-targets=".consult-strip">
        <span class="entry__num">2</span>
        <span class="entry__title">주담대 비교 메인</span>
      </button>
      <button class="entry" data-href="compare-result.html" data-targets=".consult-after-prop,.split-banner .is-consult,.consult-callout">
        <span class="entry__num">3</span>
        <span class="entry__title">주담대 비교 결과</span>
      </button>
    </div>

    <button class="home-btn" id="homeBtn">메인으로</button>
    <a class="open-new" id="openNewLink" href="index.html" target="_blank">새 탭에서 열기 ↗</a>
  </div>

  <!-- 우: 프로토타입 (메인 영역) -->
  <div class="stage">
    <div class="frame">
      <iframe id="previewFrame" src="index.html" title="대출모집인 찾기"></iframe>
      <div class="overlay" id="overlay"></div>
    </div>
  </div>
</div>

<script>
(function () {
  const frame = document.getElementById('previewFrame');
  const overlay = document.getElementById('overlay');
  const homeBtn = document.getElementById('homeBtn');
  const openNew = document.getElementById('openNewLink');
  const entries = document.querySelectorAll('.entry');

  let pendingTargets = null;
  let timers = [];
  let scrollHandler = null;

  function clearOverlay() {
    overlay.innerHTML = '';
    timers.forEach(t => clearTimeout(t));
    timers = [];
    if (scrollHandler && frame.contentWindow) {
      try { frame.contentWindow.removeEventListener('scroll', scrollHandler); } catch(e) {}
    }
    scrollHandler = null;
  }

  function placeMarker(spot, pin, el) {
    const rect = el.getBoundingClientRect();
    const frameRect = frame.getBoundingClientRect();
    const overlayRect = overlay.getBoundingClientRect();
    // iframe 내부 좌표 → overlay 좌표 (iframe과 overlay가 같은 박스이므로 그대로)
    const top = rect.top;
    const left = rect.left;
    spot.style.left = (left - 4) + 'px';
    spot.style.top = (top - 4) + 'px';
    spot.style.width = (rect.width + 8) + 'px';
    spot.style.height = (rect.height + 8) + 'px';
    if (pin) {
      pin.style.left = (left + rect.width / 2) + 'px';
      pin.style.top = top + 'px';
    }
  }

  function highlightTargets(targetsCsv) {
    clearOverlay();
    const doc = frame.contentDocument;
    if (!doc || !targetsCsv) return;
    const selectors = targetsCsv.split(',').map(s => s.trim()).filter(Boolean);
    const elements = [];
    selectors.forEach(sel => {
      const el = doc.querySelector(sel);
      if (el) elements.push(el);
    });
    if (!elements.length) {
      console.warn('[report] no targets matched:', selectors);
      return;
    }

    // 첫 타깃으로 스크롤
    try {
      elements[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (e) {}

    // 스크롤 안정화 대기 후 마커 생성
    const markers = [];
    elements.forEach((el, i) => {
      const spot = doc.createElement ? document.createElement('div') : null;
      const spotEl = document.createElement('div');
      spotEl.className = 'spot';
      const pinEl = elements.length > 1 ? document.createElement('div') : null;
      if (pinEl) {
        pinEl.className = 'pin';
        pinEl.textContent = `진입 ${i + 1}`;
      }
      // 등장 지연
      spotEl.style.opacity = '0';
      if (pinEl) pinEl.style.opacity = '0';
      overlay.appendChild(spotEl);
      if (pinEl) overlay.appendChild(pinEl);
      markers.push({ el, spot: spotEl, pin: pinEl });

      timers.push(setTimeout(() => {
        spotEl.style.opacity = '1';
        if (pinEl) pinEl.style.opacity = '1';
        placeMarker(spotEl, pinEl, el);
      }, 350 + i * 250));
    });

    // 스크롤/리사이즈 시 위치 갱신
    scrollHandler = () => {
      markers.forEach(m => {
        if (m.spot.style.opacity === '1') placeMarker(m.spot, m.pin, m.el);
      });
    };
    try {
      frame.contentWindow.addEventListener('scroll', scrollHandler, { passive: true });
    } catch (e) {}
    window.addEventListener('resize', scrollHandler);
  }

  function setActive(href) {
    entries.forEach(e => {
      e.classList.toggle('is-active', e.dataset.href === href);
    });
  }

  entries.forEach(btn => {
    btn.addEventListener('click', () => {
      const href = btn.dataset.href;
      pendingTargets = btn.dataset.targets || null;
      let sameUrl = false;
      try {
        sameUrl = frame.contentWindow && frame.contentWindow.location.href.endsWith(href);
      } catch (e) {}
      if (sameUrl) {
        highlightTargets(pendingTargets);
        pendingTargets = null;
      } else {
        clearOverlay();
        frame.src = href;
      }
      openNew.href = href;
      setActive(href);
    });
  });

  homeBtn.addEventListener('click', () => {
    pendingTargets = null;
    clearOverlay();
    frame.src = 'index.html';
    openNew.href = 'index.html';
    setActive(null);
  });

  frame.addEventListener('load', () => {
    if (pendingTargets) {
      // 콘텐츠 레이아웃 안정 대기
      setTimeout(() => {
        highlightTargets(pendingTargets);
        pendingTargets = null;
      }, 400);
    }
    try {
      const path = frame.contentWindow.location.pathname.split('/').pop();
      const search = frame.contentWindow.location.search || '';
      const full = path + search;
      const match = Array.from(entries).find(e => e.dataset.href === full || e.dataset.href.startsWith(path));
      if (match) { setActive(match.dataset.href); openNew.href = match.dataset.href; }
      else if (path === 'index.html' || path === '') { setActive(null); openNew.href = 'index.html'; }
    } catch (e) {}
  });
})();
</script>
</body>
</html>
